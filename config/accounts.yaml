# 账户配置
# 用于 Dashboard 初始化和 API 返回

accounts:
  # 币安模拟盘 (使用测试网API)
  binance_simulate:
    name: "币安模拟盘"
    initial_capital: null
    data_source: "binance_testnet"
    auto_trade: true

  # 币安实盘 (使用真实API)
  binance_real:
    name: "币安实盘"
    initial_capital: null
    data_source: "binance_real"
    auto_trade: true

  # A股模拟盘
  a_stock_simulate:
    name: "A股模拟盘"
    initial_capital: 10000
    currency: "CNY"
    position: 0
    data_source: "akshare"
    index: "sz399300"
    auto_trade: false

  # 美股模拟盘
  us_stock_simulate:
    name: "美股模拟盘"
    initial_capital: 1500
    currency: "USD"
    position: 0
    data_source: "polygon"
    ticker: "SPY"
    auto_trade: false

# 交易配置
trading_config:
  binance:
    symbol: "BTCUSDT"
    min_confidence: 0.6
    position_size: 0.02
    stop_loss: 0.03
    take_profit: 0.08

# 自动交易开关
auto_trade_enabled: true
