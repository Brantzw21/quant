BB_STD = 2  # 标准差倍数

# 均线参数
MA_SHORT = 10  # 短期均线
MA_MEDIUM = 20  # 中期均线
MA_LONG = 50  # 长期均线

# 仓位管理
MAX_POSITION_PCT = 0.3  # 最大仓位 30%
MAX_LEVERAGE = 3  # 最大杠杆 3x

# 风控参数
STOP_LOSS_PCT = 0.03  # 止损 3%
TAKE_PROFIT_PCT = 0.08  # 止盈 8%

# 过滤器
MIN_CONFIDENCE = 0.6  # 最小置信度
REQUIRED_SIGNALS = 2  # 需要至少2个信号确认
