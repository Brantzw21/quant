RSI_OVERSOLD = 35  # 超卖阈值 (优化后 35)
RSI_OVERBOUGHT = 65  # 超买阈值 (优化后 65)

# MACD参数
MACD_FAST = 12  # 快线周期
MACD_SLOW = 26  # 慢线周期
MACD_SIGNAL = 9  # 信号线周期

# 布林带参数
